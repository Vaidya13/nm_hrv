pipeline_version: "1.0"

data_format: "wfdb"

data_folder: "/zi/flstorage/group_kjp/data/ECG/9_mit-bih/mit-bih_data"

metadata_csv: "/zi/flstorage/group_kjp/data/ECG/9_mit-bih/metadata.csv"

output_dir: "/zi/flstorage/group_kjp/data/ECG/9_mit-bih/output"

# ===================================
# METADATA COLUMNS TO CARRY
# ===================================
# List every column from your metadata CSV that should appear in the output.
# participant_id and age are always carried automatically.
# Leave empty ([]) to carry ALL scalar columns (safe default).
#
# For cross-cohort normative modelling include:
#   sex, bmi, body_position, time_of_day, diagnosis, cohort, device
#
# Example:
#   metadata_columns_to_carry:
#     - sex
#     - bmi
#     - body_position
#     - cohort
#
metadata_columns_to_carry: []
 
# ===================================
# SQI MODE
# ===================================
# "flag" (default) — SQI is recorded but never blocks HRV extraction.
#   Windows get Quality="good" or "good_low_sqi". Use for heterogeneous
#   cohorts, dry electrodes, clinical data. Decide inclusion threshold
#   later using HRV_Confidence and SQI_Score columns.
# "gate" — hard stop: windows failing SQI thresholds get Quality="poor_sqi"
#   and HRV is not computed. Use only for clean single-device cohorts.
sqi_mode: "flag"
 
# ===================================
# ECG PREPROCESSING
# ===================================
hp_cutoff:    0.5
lp_cutoff:    40.0
notch_freq:   60.0     # MIT-BIH and most US PhysioNet datasets → 60 Hz
filter_order: 2
 
# ===================================
# RR PLAUSIBILITY
# ===================================
rr_min_ms:    300.0
rr_max_ms:    2000.0
 
# ===================================
# LOCAL OUTLIER DETECTION
# ===================================
local_window_beats:  11
local_dev_thresh:    0.20
 
# ===================================
# MISSED / EXTRA BEAT THRESHOLDS
# ===================================
missed_beat_gap_factor: 1.8
extra_beat_gap_factor:  0.5
 
# ===================================
# ARTIFACT TOLERANCE
# ===================================
max_artifact_fraction: 0.05
 
# ===================================
# HRV WINDOWING
# ===================================
window_sec: 300
keep_first_window_only: false
 
# ===================================
# HRV COMPUTATION
# ===================================
min_rr_for_hrv:          150
smoothness_prior_lambda: 300
 
# ===================================
# PSD SETTINGS  (Welch)
# ===================================
psd_nperseg:  256
psd_noverlap: 128
psd_window:   "hann"
 
# ===================================
# SQI THRESHOLDS
# ===================================
sqi_qrs_min:           0.25
template_corr_min:     0.80
max_flatline_fraction: 0.05
max_clipping_fraction: 0.01
min_rpeaks:            20
 
# ===================================
# PEAK DETECTION
# ===================================
ecg_peaks_method: "pantompkins1985"
 
# ===================================
# AGE HANDLING
# ===================================
age_column:               "age"
enable_age_adaptive_rules: true